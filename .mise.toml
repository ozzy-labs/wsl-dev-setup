[tools]
# Runtime & package managers (commitlint に必要)
node = "24"
pnpm = "10"

# Linters & formatters
shellcheck = "0.11"
shfmt = "3"
bats = "1"
"npm:markdownlint-cli2" = "0.21"
"pipx:yamllint" = "1"
yamlfmt = "0.21"
actionlint = "1"
gitleaks = "8"
trivy = "0.69.3"
"pipx:mdformat" = "0.7"

# Git hooks & commit conventions
lefthook = "2"
"npm:@commitlint/cli" = "20"
"npm:@commitlint/config-conventional" = "20"
