name: lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Static analysis (shellcheck / shfmt / markdownlint / yaml / gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MISE_DISABLE_TOOLS: trivy

      - name: shellcheck
        run: |
          mise exec -- shellcheck --severity=warning \
            install.sh scripts/*.sh \
            tests/smoke/run.sh tests/integration/*.sh

      - name: shfmt
        run: |
          mise exec -- shfmt -d \
            install.sh scripts/*.sh \
            tests/smoke/run.sh tests/integration/*.sh

      - name: markdownlint
        run: mise exec -- markdownlint-cli2 '**/*.md'

      - name: yamllint
        run: |
          # Only check files we author (workflows, mise config, etc.), not transient Docker / CI caches
          mise exec -- yamllint -c .yamllint.yaml \
            .github/workflows \
            .mise.toml \
            .markdownlint-cli2.yaml \
            .yamllint.yaml \
            lefthook.yaml \
            lefthook-base.yaml \
            2>/dev/null || true

      - name: gitleaks
        run: mise exec -- gitleaks detect --no-banner --redact -v
