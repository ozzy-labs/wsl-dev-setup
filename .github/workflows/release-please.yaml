name: release-please

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.1.3
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # Release 作成時のみ asset 添付ジョブをトリガー
      # release_created が true の場合 outputs.tag_name にタグ名 (vX.Y.Z) が入る
      # ----------------------------------------------------------------
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - name: Compute SHA256 checksum for install.sh
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          sha256sum install.sh > install.sh.sha256
          echo "Generated checksum:"
          cat install.sh.sha256

      - name: Attach install.sh and SHA256 to GitHub Release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          gh release upload "$TAG" \
            install.sh \
            install.sh.sha256 \
            --clobber
