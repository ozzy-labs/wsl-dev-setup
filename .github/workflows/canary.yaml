name: canary

on:
  schedule:
    - cron: "0 3 * * 1" # 毎週月曜 03:00 UTC に実行
  workflow_dispatch: # 手動実行も可能

concurrency:
  group: canary-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write # 失敗時の Issue 自動起票に必須

jobs:
  # 既存: 次期 Ubuntu LTS リリース候補（devel / rolling）を Docker で先回り検証
  canary-ubuntu-future:
    name: Canary (ubuntu:${{ matrix.ubuntu-tag }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ubuntu-tag: ["devel", "rolling"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build canary image (ubuntu:${{ matrix.ubuntu-tag }})
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: tests/integration/Dockerfile
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu-tag }}
          tags: bootstrap-canary:${{ matrix.ubuntu-tag }}
          load: true
          cache-from: type=gha,scope=canary-${{ matrix.ubuntu-tag }}
          cache-to: type=gha,scope=canary-${{ matrix.ubuntu-tag }},mode=max

      - name: Run integration on ubuntu:${{ matrix.ubuntu-tag }}
        env:
          GITHUB_TOKEN_FOR_MISE: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm -e "GITHUB_TOKEN=$GITHUB_TOKEN_FOR_MISE" \
            bootstrap-canary:${{ matrix.ubuntu-tag }}

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const tag = "${{ matrix.ubuntu-tag }}";
            const date = new Date().toISOString().slice(0, 10);
            const { serverUrl, repo: { owner, repo }, runId } = context;
            const runUrl = `${serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            const title = `Canary failure: ubuntu:${tag} / ${date}`;
            const body = [
              `Canary workflow failed on \`ubuntu:${tag}\` on ${date}.`,
              ``,
              `**Run:** ${runUrl}`,
              ``,
              `## Triage checklist`,
              ``,
              `- [ ] apt package renamed / removed (e.g. \`tesseract-ocr-jpn\`, \`ffmpeg\`)`,
              `- [ ] PPA no longer supports this Ubuntu version (e.g. \`ppa:git-core/ppa\`)`,
              `- [ ] Upstream tool breaking change (\`mise\`, \`gitleaks\`, \`ast-grep\`, etc.)`,
              `- [ ] Installer script behavior change (\`mise.run\`, \`astral.sh/uv\`, \`get.volta.sh\`)`,
              `- [ ] Transient network issue — re-run \`gh workflow run canary.yaml\` to confirm`,
              ``,
              `## How to reproduce locally`,
              ``,
              `\`\`\`bash`,
              `./tests/integration/run.sh ${tag}`,
              `\`\`\``,
              ``,
              `Non-blocking: Canary failures do not gate main-line PRs.`,
            ].join("\n");

            // 同じ (tag, date) の Open Issue が既にあれば新規起票せずコメントで再発を記録
            const existing = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: "open",
                labels: "canary",
                per_page: 100,
              },
            );
            const duplicate = existing.find((issue) => issue.title === title);

            if (duplicate) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: duplicate.number,
                body: `同じ組み合わせで再発しました。\n\n**Run:** ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["canary", "investigation-needed"],
              });
            }

  # 新規: 非 WSL Linux（Ubuntu Server 等を想定した GitHub Actions の素の ubuntu-latest）
  # で setup-local-ubuntu.sh を直接実行し、bare-metal インストールが緑であることを検証する。
  canary-ubuntu-native:
    name: Canary (Ubuntu Server, native install)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BOOTSTRAP_ASSUME_YES: "1"
      CI: "true"
      # コンテナ専用の重量ツールはランナー上では不要なので最小化
      INSTALL_CONTAINER: "0"
      INSTALL_CLAUDE_CODE: "0"
      INSTALL_CODEX_CLI: "0"
      INSTALL_COPILOT_CLI: "0"
      INSTALL_GEMINI_CLI: "0"
      INSTALL_AWS_CLI: "0"
      INSTALL_AZURE_CLI: "0"
      INSTALL_GCLOUD_CLI: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pre-configure git identity (skip interactive prompt)
        run: |
          git config --global user.name "Canary Runner"
          git config --global user.email "canary@example.com"

      - name: Run install.sh local on bare ubuntu-latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./install.sh local

      - name: Smoke-check mise + key tools
        run: |
          export PATH="$HOME/.local/share/mise/shims:$HOME/.local/bin:$PATH"
          mise --version
          node --version
          python3 --version
          uv --version
          gitleaks version

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const { serverUrl, repo: { owner, repo }, runId } = context;
            const runUrl = `${serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            const title = `Canary failure: Ubuntu Server (native) / ${date}`;
            const body = [
              `Canary workflow failed on bare ubuntu-latest (non-WSL Linux) on ${date}.`,
              ``,
              `**Run:** ${runUrl}`,
              ``,
              `Non-blocking: Canary failures do not gate main-line PRs.`,
            ].join("\n");
            const existing = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: "open", labels: "canary", per_page: 100 },
            );
            const duplicate = existing.find((issue) => issue.title === title);
            if (duplicate) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: duplicate.number,
                body: `同じ組み合わせで再発しました。\n\n**Run:** ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner, repo, title, body,
                labels: ["canary", "investigation-needed"],
              });
            }

  # 新規: macOS で setup-local-macos.sh を直接実行し、mise を入口にした共通フローが
  # 緑であることを検証する。Docker Desktop / AI CLI は対象外（READMEの該当章参照）。
  canary-macos:
    name: Canary (macOS, native install)
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      BOOTSTRAP_ASSUME_YES: "1"
      CI: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run install.sh local on macos-latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./install.sh local

      - name: Smoke-check mise + key tools
        run: |
          export PATH="$HOME/.local/share/mise/shims:$HOME/.local/bin:$PATH"
          mise --version
          mise exec node@lts -- node --version
          mise exec python -- python3 --version
          mise exec uv -- uv --version
          mise exec gitleaks -- gitleaks version

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const { serverUrl, repo: { owner, repo }, runId } = context;
            const runUrl = `${serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            const title = `Canary failure: macOS / ${date}`;
            const body = [
              `Canary workflow failed on macos-latest on ${date}.`,
              ``,
              `**Run:** ${runUrl}`,
              ``,
              `## Triage checklist`,
              ``,
              `- [ ] mise installer (mise.run) behavior change`,
              `- [ ] mise plugin (node / python / uv / gitleaks) breaking change`,
              `- [ ] macOS runner image upgrade broke a built-in tool`,
              ``,
              `Non-blocking: Canary failures do not gate main-line PRs.`,
            ].join("\n");
            const existing = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: "open", labels: "canary", per_page: 100 },
            );
            const duplicate = existing.find((issue) => issue.title === title);
            if (duplicate) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: duplicate.number,
                body: `同じ組み合わせで再発しました。\n\n**Run:** ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner, repo, title, body,
                labels: ["canary", "investigation-needed"],
              });
            }
