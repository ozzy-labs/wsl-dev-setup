name: test-integration

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    # Run on main push / manual dispatch unconditionally, or on PRs when tagged with `ci:integration`.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:integration')
    name: Integration test (ubuntu:${{ matrix.ubuntu }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["22.04", "24.04"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build test image (ubuntu:${{ matrix.ubuntu }})
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: tests/integration/Dockerfile
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu }}
          tags: wsl-dev-setup-test:${{ matrix.ubuntu }}
          load: true
          cache-from: type=gha,scope=ubuntu-${{ matrix.ubuntu }}
          cache-to: type=gha,scope=ubuntu-${{ matrix.ubuntu }},mode=max

      - name: Run integration test (install + idempotency)
        env:
          # mise の GitHub API 叩きを認証して rate limit を 5000/hr に上げる
          GITHUB_TOKEN_FOR_MISE: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm -e "GITHUB_TOKEN=$GITHUB_TOKEN_FOR_MISE" wsl-dev-setup-test:${{ matrix.ubuntu }}
