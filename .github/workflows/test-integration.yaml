name: test-integration

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    # Run on main push / manual dispatch unconditionally, or on PRs when tagged with `ci:integration`.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:integration')
    name: Integration test (ubuntu:${{ matrix.ubuntu }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["22.04", "24.04"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MISE_DISABLE_TOOLS: trivy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build test image (ubuntu:${{ matrix.ubuntu }})
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: tests/integration/Dockerfile
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu }}
          tags: bootstrap-test:${{ matrix.ubuntu }}
          load: true
          cache-from: type=gha,scope=ubuntu-${{ matrix.ubuntu }}
          cache-to: type=gha,scope=ubuntu-${{ matrix.ubuntu }},mode=max

      - name: Run integration test (install + idempotency)
        env:
          # mise の GitHub API 叩きを認証して rate limit を 5000/hr に上げる
          GITHUB_TOKEN_FOR_MISE: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm -e "GITHUB_TOKEN=$GITHUB_TOKEN_FOR_MISE" bootstrap-test:${{ matrix.ubuntu }}
