name: バグ報告
description: 再現手順付きのバグ報告
labels: ["fix"]
body:
  - type: textarea
    id: description
    attributes:
      label: 概要
      description: バグの内容を簡潔に記述してください。
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      description: バグを再現する手順を記述してください。
      placeholder: |
        1. ... を実行
        2. ... を選択
        3. エラーが発生
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どのように動作すべきか。
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際に何が起きたか。
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 補足情報
      description: OS、ランタイムバージョン、スクリーンショットなど。
